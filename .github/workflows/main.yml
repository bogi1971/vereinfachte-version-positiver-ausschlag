name: VVPA Auto-Scanner

on:
  schedule:
    # Alle 15 Minuten während Marktzeiten (9:30-16:00 EST)
    - cron: '*/15 13-20 * * 1-5'  # Mo-Fr, 13:30-20:00 UTC
  workflow_dispatch:

jobs:
  vvpa-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 14  # Muss unter 15 Min bleiben
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install deps
      run: pip install aiohttp
    
    - name: Run VVPA Cycle
      env:
        POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        MAX_PRICE: ${{ secrets.MAX_PRICE || '30.0' }}
        ALERT_THRESHOLD: ${{ secrets.ALERT_THRESHOLD || '5.0' }}
        MIN_VOLUME: ${{ secrets.MIN_VOLUME || '10000' }}
      run: python VPA.py
