name: VVPA Auto-Scanner

on:
  schedule:
    # Pre-Market: 4:00-9:30 EST (9:00-14:30 UTC)
    - cron: '*/15 9-14 * * 1-5'
    # Regular Market: 9:30-16:00 EST (14:30-20:00 UTC)
    - cron: '*/15 14-20 * * 1-5'
    # Post-Market: 16:00-20:00 EST (20:00-00:00 UTC)
    - cron: '*/15 20-23 * * 1-5'
  workflow_dispatch:

jobs:
  vvpa-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install aiohttp
    
    - name: Run VVPA Scanner
      env:
        POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        MAX_PRICE: ${{ secrets.MAX_PRICE || '30.0' }}
        ALERT_THRESHOLD: ${{ secrets.ALERT_THRESHOLD || '5.0' }}
        MIN_VOLUME: ${{ secrets.MIN_VOLUME || '10000' }}
        CYCLE_MINUTES: ${{ secrets.CYCLE_MINUTES || '15' }}
      run: python VPA.py
